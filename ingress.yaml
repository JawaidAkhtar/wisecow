apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wisecow-ingress
spec:
  tls:
  - hosts:
    - wisecow.local
    secretName: wisecow-tls
  rules:
  - host: wisecow.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wisecow-server-svc
            port:
              number: 4499

  - host: ""
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wisecow-server-svc
            port:
              number: 4499