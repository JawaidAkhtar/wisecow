name: Build and Deploy Wisecow

on:
#  push:
#    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      commit_sha: ${{ steps.vars.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short commit SHA
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "LOWER_OWNER=$LOWER_OWNER" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image with commit SHA tag
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.LOWER_OWNER }}/wisecow:${{ steps.vars.outputs.sha }} .
          whoami
      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.LOWER_OWNER }}/wisecow:${{ steps.vars.outputs.sha }}

  deploy:
    needs: build
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Convert owner to lowercase
        run: |
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "LOWER_OWNER=$LOWER_OWNER" >> $GITHUB_ENV

      - name: Get commit SHA from build job
        id: vars
        run: |
          echo "sha=${{ needs.build.outputs.commit_sha }}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Docker image (with commit SHA tag) into Minikube
        run: |
          eval $(minikube docker-env)
          docker pull ${{ env.REGISTRY }}/${{ env.LOWER_OWNER }}/wisecow:${{ steps.vars.outputs.sha }}

      - name: Deploy to Minikube (with image tag substitution)
        run: |
          # Apply the manifests but then update the deployment image tag
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
          kubectl apply -f ingress.yaml
          kubectl set image deployment/wisecow-server wisecow=${{ env.REGISTRY }}/${{ env.LOWER_OWNER }}/wisecow:${{ steps.vars.outputs.sha }}
          kubectl rollout status deployment/wisecow-server --timeout=90s

      - name: Wait and verify pods
        run: |
          kubectl wait --for=condition=ready pod -l app=wisecow-server --timeout=90s || true
          kubectl get pods -o wide
          kubectl describe pods
          kubectl logs --all-containers=true --prefix=true || true

      - name: Test service (if pod running)
        run: |
          if kubectl get pods | grep -q Running; then
             curl $(minikube service wisecow-server-svc --url)
          else
             echo "No running pod, skipping test"
             exit 1
          fi

          kubectl port-forward --namespace ingress-nginx service/ingress-nginx-controller 30443:443 --address 0.0.0.0 &
